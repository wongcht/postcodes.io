type: object
description: |
  A Scottish postcode record sourced from the Scottish Postcode Directory (SPD).
  Top-level fields hold the latest (canonical) value for each datapoint.
  Year-suffixed fields hold prior versions where available. The `codes` block
  mirrors the same datapoints with their GSS / official codes.
required:
  - postcode
  - longitude
  - latitude
  - council_area
  - electoral_ward
  - health_board_area
  - data_zone
  - intermediate_zone
  - output_area
  - scottish_parliamentary_constituency
  - scottish_parliamentary_region
  - codes
properties:
  postcode:
    title: Postcode
    type: string
    description: The Royal Mail postcode (e.g., AB10 1XG).
    example: "AB10 1XG"
    pattern: "^[A-Z]{1,2}[0-9][A-Z0-9]? ?[0-9][A-Z]{2}$"
  pc_compact:
    title: Compact Postcode
    type: string
    description: Postcode with all spaces removed.
    example: "AB101XG"
  outcode:
    title: Outward Code
    type: string
    description: First part of the postcode (before the space).
    example: "AB10"
  incode:
    title: Inward Code
    type: string
    description: Second part of the postcode (after the space).
    example: "1XG"
  postcode_district:
    title: Postcode District
    type: string
    description: Equivalent to the outward code.
    example: "AB10"
  postcode_sector:
    title: Postcode Sector
    type: string
    description: Outward code plus the first character of the inward code.
    example: "AB10 1"
  user_type:
    title: User Type
    type: string
    nullable: true
    description: SPD user-type indicator ("0" = small user, "1" = large user).
    example: "0"
  date_of_introduction:
    title: Date of Introduction
    type: string
    nullable: true
    description: Date the postcode was introduced (YYYYMM).
    example: "198001"
  date_of_deletion:
    title: Date of Deletion
    type: string
    nullable: true
    description: Date the postcode was deleted (YYYYMM). Null for live postcodes.
    example: null
  linked_small_user_postcode:
    title: Linked Small User Postcode
    type: string
    nullable: true
    description: For large-user postcodes, the linked small-user postcode (if any).
    example: null
  longitude:
    title: Longitude
    type: number
    format: double
    nullable: true
    description: WGS84 longitude.
    example: -2.10250
  latitude:
    title: Latitude
    type: number
    format: double
    nullable: true
    description: WGS84 latitude.
    example: 57.14945
  eastings:
    title: Eastings
    type: integer
    format: int32
    nullable: true
    description: OS National Grid easting (1m resolution).
    example: 393859
  northings:
    title: Northings
    type: integer
    format: int32
    nullable: true
    description: OS National Grid northing (1m resolution).
    example: 806073
  split_indicator:
    title: Split Indicator
    type: string
    nullable: true
    description: SPD split indicator. Marks postcodes that span more than one administrative unit.
    example: "0"
  grid_link_indicator:
    title: Grid Link Indicator
    type: string
    nullable: true
    description: How the postcode was linked to its grid reference (1 = match by address, 2 = match by visual inspection, 3 = approximate match, etc.).
    example: "1"
  grid_link_positional_accuracy:
    title: Grid Link Positional Accuracy
    type: string
    nullable: true
    description: Positional accuracy of the grid reference.
    example: "1"
  council_area:
    title: Council Area
    type: string
    nullable: true
    description: 2019 council area name. The current single-tier local authority.
    example: "Aberdeen City"
  electoral_ward:
    title: Electoral Ward
    type: string
    nullable: true
    description: 2022 electoral ward name.
    example: "Midstocket/Rosemount"
  registration_district:
    title: Registration District
    type: string
    nullable: true
    description: 2007 registration district code. (Names are not provided in SPD.)
    example: "RD20"
  enterprise_region:
    title: Enterprise Region
    type: string
    nullable: true
    description: 2008 enterprise region name.
    example: "Highlands and Islands"
  strategic_development_planning_area:
    title: Strategic Development Planning Area
    type: string
    nullable: true
    description: 2013 SDPA code. Names are not provided in SPD.
    example: "SD01"
  local_government_district:
    title: Local Government District
    type: string
    nullable: true
    description: 1995 local government district name (the most recent boundary before unitary council areas).
    example: "Aberdeen City"
  local_government_district_1991:
    title: Local Government District (1991)
    type: string
    nullable: true
    description: 1991 local government district name (historical).
    example: "City of Aberdeen"
  uk_parliamentary_constituency:
    title: UK Parliamentary Constituency (2024)
    type: string
    nullable: true
    description: 2024 UK Parliamentary constituency name.
    example: "Aberdeen South"
  scottish_parliamentary_region:
    title: Scottish Parliamentary Region (2025)
    type: string
    nullable: true
    description: >-
      2025 Scottish Parliamentary region name (Second Review of Scottish
      Parliament Boundaries, SSI 2025/285, effective at the 7 May 2026 Holyrood
      election). This is the current designation.
    example: "North East Scotland"
  scottish_parliamentary_region_2021:
    title: Scottish Parliamentary Region (2021)
    type: string
    nullable: true
    description: 2021 Scottish Parliamentary region name (superseded by the 2025 designation).
    example: "North East Scotland"
  scottish_parliamentary_constituency:
    title: Scottish Parliamentary Constituency (2025)
    type: string
    nullable: true
    description: >-
      2025 Scottish Parliamentary constituency name (Second Review of Scottish
      Parliament Boundaries, SSI 2025/285, effective at the 7 May 2026 Holyrood
      election). This is the current designation.
    example: "Aberdeen Central"
  scottish_parliamentary_constituency_2021:
    title: Scottish Parliamentary Constituency (2021)
    type: string
    nullable: true
    description: 2021 Scottish Parliamentary constituency name (superseded by the 2025 designation).
    example: "Aberdeen Central"
  health_board_area:
    title: Health Board Area (2019)
    type: string
    nullable: true
    description: 2019 NHS health board area name. Current operational boundary.
    example: "Grampian"
  health_board_area_2006:
    title: Health Board Area (2006)
    type: string
    nullable: true
    description: 2006 health board area name (historical).
    example: "Grampian"
  health_board_area_1995:
    title: Health Board Area (1995)
    type: string
    nullable: true
    description: 1995 health board area name (historical).
    example: "Grampian"
  integration_authority:
    title: Integration Authority (2019)
    type: string
    nullable: true
    description: 2019 health and social care integration authority name.
    example: "Aberdeen City"
  output_area:
    title: Output Area (2022)
    type: string
    nullable: true
    description: 2022 census Output Area code. The smallest census geography.
    example: "S00136537"
  output_area_2011:
    title: Output Area (2011)
    type: string
    nullable: true
    description: 2011 census Output Area code.
    example: "S00088970"
  output_area_2001:
    title: Output Area (2001)
    type: string
    nullable: true
    description: 2001 census Output Area code.
    example: "S00000700"
  output_area_1991:
    title: Output Area (1991)
    type: string
    nullable: true
    description: 1991 census Output Area code.
    example: null
  data_zone:
    title: Data Zone (2022)
    type: string
    nullable: true
    description: 2022 Data Zone name. Scottish equivalent of LSOA.
    example: "West End North - 01"
  data_zone_2011:
    title: Data Zone (2011)
    type: string
    nullable: true
    description: 2011 Data Zone code.
    example: "S01006571"
  data_zone_2001:
    title: Data Zone (2001)
    type: string
    nullable: true
    description: 2001 Data Zone code.
    example: "S01000125"
  intermediate_zone:
    title: Intermediate Zone (2022)
    type: string
    nullable: true
    description: 2022 Intermediate Zone name. Scottish equivalent of MSOA.
    example: "West End North"
  intermediate_zone_2011:
    title: Intermediate Zone (2011)
    type: string
    nullable: true
    description: 2011 Intermediate Zone code.
    example: "S02000007"
  intermediate_zone_2001:
    title: Intermediate Zone (2001)
    type: string
    nullable: true
    description: 2001 Intermediate Zone code.
    example: "S02000017"
  locality:
    title: Locality (2022)
    type: string
    nullable: true
    description: 2022 Settlement-and-Locality locality name.
    example: "Aberdeen"
  locality_2020:
    title: Locality (2020)
    type: string
    nullable: true
    description: 2020 locality name (historical).
    example: "Aberdeen"
  locality_2001:
    title: Locality (2001)
    type: string
    nullable: true
    description: 2001 locality name (historical).
    example: "Aberdeen"
  locality_1991:
    title: Locality (1991)
    type: string
    nullable: true
    description: 1991 locality name (historical).
    example: null
  settlement:
    title: Settlement (2022)
    type: string
    nullable: true
    description: 2022 settlement name.
    example: "Aberdeen, Milltimber, and Peterculter"
  settlement_2020:
    title: Settlement (2020)
    type: string
    nullable: true
    description: 2020 settlement name (historical).
    example: "Aberdeen Settlement"
  settlement_2001:
    title: Settlement (2001)
    type: string
    nullable: true
    description: 2001 settlement name (historical).
    example: "Aberdeen Settlement"
  civil_parish:
    title: Civil Parish (1930)
    type: string
    nullable: true
    description: 1930 Scottish civil parish name (the latest historical baseline; civil parishes were abolished as administrative units in 1975).
    example: "Old Machar"
  island:
    title: Island
    type: string
    nullable: true
    description: Island name where the postcode is located. "Mainland of Scotland" for non-island postcodes.
    example: "Mainland of Scotland"
  national_park:
    title: National Park (2010)
    type: string
    nullable: true
    description: 2010 national park name (Cairngorms / Loch Lomond and the Trossachs). Null for non-park postcodes.
    example: null
  travel_to_work_area:
    title: Travel to Work Area (2011)
    type: string
    nullable: true
    description: 2011 Travel to Work Area name.
    example: "Aberdeen"
  lau_level_1:
    title: Local Administrative Unit Level 1 (2025)
    type: string
    nullable: true
    description: 2025 LAU level 1 name. Replaces the previous NUTS classifications.
    example: "Aberdeen City"
  itl_level_2:
    title: International Territorial Level 2 (2025)
    type: string
    nullable: true
    description: 2025 ITL level 2 name. Mid-tier UK statistical geography (replaces NUTS 2).
    example: "North Eastern Scotland"
  itl_level_3:
    title: International Territorial Level 3 (2025)
    type: string
    nullable: true
    description: 2025 ITL level 3 name. The most granular ITL geography (replaces NUTS 3).
    example: "Aberdeen City and Aberdeenshire"
  urban_rural_6_fold:
    title: Urban-Rural Classification (6-fold, 2022)
    type: string
    nullable: true
    description: |
      2022 Scottish Government 6-fold urban-rural classification code:

      * 1: Large Urban Areas
      * 2: Other Urban Areas
      * 3: Accessible Small Towns
      * 4: Remote Small Towns
      * 5: Accessible Rural
      * 6: Remote Rural
    example: "1"
  urban_rural_8_fold:
    title: Urban-Rural Classification (8-fold, 2022)
    type: string
    nullable: true
    description: 2022 Scottish Government 8-fold urban-rural classification code (1–8). Splits "Remote" categories into "Remote" and "Very Remote".
    example: "1"
  scottish_index_of_multiple_deprivation:
    title: Scottish Index of Multiple Deprivation (2020)
    type: integer
    format: int32
    nullable: true
    description: SIMD 2020 rank for the postcode's Data Zone (1 = most deprived, 6976 = least deprived).
    example: 6414
  roa_community_planning_partnership:
    title: Community Planning Partnership (ROA 2006)
    type: string
    nullable: true
    description: 2006 Community Planning Partnership name (Regional Outcome Agreement geography).
    example: "Aberdeen City"
  roa_local:
    title: Local Authority (ROA 2006)
    type: string
    nullable: true
    description: 2006 Regional Outcome Agreement local authority name.
    example: "Aberdeen City"
  census_household_count:
    title: Census Household Count (2022)
    type: integer
    format: int32
    nullable: true
    description: Number of households recorded against this postcode at the 2022 census. May be 0 for empty or zero-suppressed postcodes.
    example: 0
  census_household_count_2011:
    title: Census Household Count (2011)
    type: integer
    format: int32
    nullable: true
    description: Number of households recorded at the 2011 census.
    example: 8
  census_household_count_2001:
    title: Census Household Count (2001)
    type: integer
    format: int32
    nullable: true
    description: Number of households recorded at the 2001 census.
    example: 12
  census_household_count_1991:
    title: Census Household Count (1991)
    type: integer
    format: int32
    nullable: true
    description: Number of households recorded at the 1991 census.
    example: null
  census_population_count:
    title: Census Population Count (2022)
    type: integer
    format: int32
    nullable: true
    description: Resident population recorded against this postcode at the 2022 census.
    example: 0
  census_population_count_2011:
    title: Census Population Count (2011)
    type: integer
    format: int32
    nullable: true
    description: Resident population recorded at the 2011 census.
    example: 18
  census_population_count_2001:
    title: Census Population Count (2001)
    type: integer
    format: int32
    nullable: true
    description: Resident population recorded at the 2001 census.
    example: 26
  census_population_count_1991:
    title: Census Population Count (1991)
    type: integer
    format: int32
    nullable: true
    description: Resident population recorded at the 1991 census.
    example: null
  never_digitised:
    title: Never Digitised
    type: boolean
    description: True if the postcode has never been digitised (no grid reference established).
    example: false
  codes:
    title: Codes
    type: object
    description: GSS / official codes for the corresponding name fields above.
    properties:
      council_area:
        title: Council Area Code (2019)
        type: string
        nullable: true
        description: 9-character GSS code for the 2019 council area.
        example: "S12000033"
      electoral_ward:
        title: Electoral Ward Code (2022)
        type: string
        nullable: true
        description: 9-character GSS code for the 2022 electoral ward.
        example: "S13002841"
      enterprise_region:
        title: Enterprise Region Code (2008)
        type: string
        nullable: true
        description: Code for the 2008 enterprise region.
        example: "S99999999"
      local_government_district:
        title: Local Government District Code (1995)
        type: string
        nullable: true
        description: Code for the 1995 local government district.
        example: "S12000033"
      local_government_district_1991:
        title: Local Government District Code (1991)
        type: string
        nullable: true
        description: Code for the 1991 local government district.
        example: "S99999999"
      uk_parliamentary_constituency:
        title: UK Parliamentary Constituency Code (2024)
        type: string
        nullable: true
        description: 9-character GSS code for the 2024 UK Parliamentary constituency.
        example: "S14000061"
      scottish_parliamentary_region:
        title: Scottish Parliamentary Region Code (2025)
        type: string
        nullable: true
        description: 9-character GSS code for the 2025 Scottish Parliamentary region (current designation).
        example: "S17000026"
      scottish_parliamentary_region_2021:
        title: Scottish Parliamentary Region Code (2021)
        type: string
        nullable: true
        description: 9-character GSS code for the superseded 2021 Scottish Parliamentary region.
        example: "S17000014"
      scottish_parliamentary_constituency:
        title: Scottish Parliamentary Constituency Code (2025)
        type: string
        nullable: true
        description: 9-character GSS code for the 2025 Scottish Parliamentary constituency (current designation).
        example: "S16000151"
        pattern: "^S[0-9]{8}$"
      scottish_parliamentary_constituency_2021:
        title: Scottish Parliamentary Constituency Code (2021)
        type: string
        nullable: true
        description: 9-character GSS code for the superseded 2021 Scottish Parliamentary constituency.
        example: "S16000074"
        pattern: "^S[0-9]{8}$"
      health_board_area:
        title: Health Board Area Code (2019)
        type: string
        nullable: true
        description: 9-character GSS code for the 2019 NHS health board area.
        example: "S08000020"
      health_board_area_2006:
        title: Health Board Area Code (2006)
        type: string
        nullable: true
        description: GSS code for the 2006 health board area.
        example: "S08000006"
      health_board_area_1995:
        title: Health Board Area Code (1995)
        type: string
        nullable: true
        description: Code for the 1995 health board area.
        example: "0"
      integration_authority:
        title: Integration Authority Code (2019)
        type: string
        nullable: true
        description: 9-character GSS code for the 2019 integration authority.
        example: "S37000002"
      data_zone:
        title: Data Zone Code (2022)
        type: string
        nullable: true
        description: GSS code for the 2022 Data Zone.
        example: "S01013550"
      data_zone_2011:
        title: Data Zone Code (2011)
        type: string
        nullable: true
        description: GSS code for the 2011 Data Zone.
        example: "S01006571"
      data_zone_2001:
        title: Data Zone Code (2001)
        type: string
        nullable: true
        description: Code for the 2001 Data Zone.
        example: "S01000125"
      intermediate_zone:
        title: Intermediate Zone Code (2022)
        type: string
        nullable: true
        description: GSS code for the 2022 Intermediate Zone.
        example: "S02002527"
      intermediate_zone_2011:
        title: Intermediate Zone Code (2011)
        type: string
        nullable: true
        description: GSS code for the 2011 Intermediate Zone.
        example: "S02000007"
      intermediate_zone_2001:
        title: Intermediate Zone Code (2001)
        type: string
        nullable: true
        description: Code for the 2001 Intermediate Zone.
        example: "S02000017"
      locality:
        title: Locality Code (2022)
        type: string
        nullable: true
        description: Code for the 2022 locality.
        example: "S19000001"
      settlement:
        title: Settlement Code (2022)
        type: string
        nullable: true
        description: Code for the 2022 settlement.
        example: "S20000001"
      civil_parish:
        title: Civil Parish Code (1930)
        type: string
        nullable: true
        description: Code for the 1930 civil parish.
        example: "S07000001"
      island:
        title: Island Code
        type: string
        nullable: true
        description: Island identifier code.
        example: "S20000001"
      national_park:
        title: National Park Code (2010)
        type: string
        nullable: true
        description: Code for the 2010 national park.
        example: null
      travel_to_work_area:
        title: Travel to Work Area Code (2011)
        type: string
        nullable: true
        description: Code for the 2011 Travel to Work Area.
        example: "S22000047"
      lau_level_1:
        title: LAU Level 1 Code (2025)
        type: string
        nullable: true
        description: Code for the 2025 LAU level 1 area.
        example: "TLM50"
      itl_level_2:
        title: ITL Level 2 Code (2025)
        type: string
        nullable: true
        description: Code for the 2025 ITL level 2 area.
        example: "TLM5"
      itl_level_3:
        title: ITL Level 3 Code (2025)
        type: string
        nullable: true
        description: Code for the 2025 ITL level 3 area.
        example: "TLM50"
      registration_district:
        title: Registration District Code (2007)
        type: string
        nullable: true
        description: Code for the 2007 registration district.
        example: "RD20"
      strategic_development_planning_area:
        title: SDPA Code (2013)
        type: string
        nullable: true
        description: Code for the 2013 strategic development planning area.
        example: "SD01"
      roa_community_planning_partnership:
        title: Community Planning Partnership Code (ROA 2006)
        type: string
        nullable: true
        description: Code for the 2006 community planning partnership.
        example: "S12000033"
      roa_local:
        title: ROA Local Code (2006)
        type: string
        nullable: true
        description: Code for the 2006 ROA local authority.
        example: "S12000033"
