# Tuned for read-only workload, ~4 GB container budget.
# The dump is loaded once via `make seed`; no writes after that.

listen_addresses = '*'

# Memory
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 32MB
maintenance_work_mem = 256MB
huge_pages = try

# Planner (SSD-ish storage, large RAM cache)
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200

# Parallelism — spatial / autocomplete benefit; cheap point lookups won't parallelise
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4

# Write path minimised — only initdb + dump load ever writes
wal_level = minimal
max_wal_senders = 0
synchronous_commit = off
full_page_writes = off
checkpoint_timeout = 30min
max_wal_size = 4GB
fsync = on

# Autovacuum off — nothing changes after seed
autovacuum = off

# JIT — usually a loss for short OLTP-style queries
jit = off

# Logging — keep stock
log_timezone = 'UTC'
timezone = 'UTC'
