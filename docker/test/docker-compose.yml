services:
  pg:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: postcodeio_testing
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: pg
      POSTGRES_USER: postcodesio
  api:
    build:
      context: ../../
      dockerfile: ./docker/test/Dockerfile
    environment:
      POSTGRES_HOST: pg
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postcodesio
      POSTGRES_DATABASE: postcodeio_testing
    depends_on:
      - pg
    volumes:
      - "../../:/app/"
    command: tail
